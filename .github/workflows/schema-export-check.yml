name: Schema Export Check

on:
  push:
    branches: [main]
    paths:
      - 'src/macro_positioning/integration/contracts.py'
      - 'integration_schema/**'
      - 'scripts/export_integration_schema.py'
  pull_request:
    paths:
      - 'src/macro_positioning/integration/contracts.py'
      - 'integration_schema/**'
      - 'scripts/export_integration_schema.py'

jobs:
  verify-schema-export:
    runs-on: ubuntu-latest
    name: Re-export schema and verify no drift
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Re-run schema export
        run: |
          python scripts/export_integration_schema.py

      - name: Verify export matches committed schema
        run: |
          if ! git diff --exit-code integration_schema/; then
            echo "::error::Schema export drift detected!"
            echo "Someone changed contracts.py without re-running scripts/export_integration_schema.py"
            echo "Please run: python scripts/export_integration_schema.py && git add integration_schema/ && commit"
            exit 1
          fi
          echo "✓ Schema export matches committed version"
