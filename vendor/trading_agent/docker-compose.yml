version: "3.9"

services:
  trading-agent:
    build: .
    container_name: trading-agent
    restart: unless-stopped
    env_file: .env
    environment:
      HEALTH_PORT: "8081"
    ports:
      - "8081:8081"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./trade_images:/app/trade_images:ro
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
